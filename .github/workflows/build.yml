    - name: Build and Publish
      run: |
        # 🚀 核心修改：去掉 -p:PublishSingleFile=true，改成标准的绿色文件夹发布
        dotnet publish LuckyDrive/LuckyDrive.csproj -c Release -r win-x64 --self-contained true -o ./publish

    - name: Compress Release Artifact
      run: |
        # 将整个 publish 文件夹压缩为 zip 包
        powershell Compress-Archive -Path ./publish/* -DestinationPath ./LuckyDrive_GreenFolder_Windows.zip

    - name: Create Release
      # ... 后续的上传步骤，记得把文件名改成 LuckyDrive_GreenFolder_Windows.zip
