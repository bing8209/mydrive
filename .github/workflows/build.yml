name: Build and Release Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: |
        dotnet restore LuckyDrive/LuckyDrive.csproj -r win-x64

    # 👇 终极改动：删掉所有 -p:PublishSingleFile 语法，改用最传统的标准绿色版发布
    - name: Publish Regular Green Version
      run: |
        dotnet publish LuckyDrive/LuckyDrive.csproj -c Release -r win-x64 --self-contained true -o ./publish

    # 把整个生成的标准文件夹打包成 ZIP
    - name: Compress Release Artifact
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./LuckyDrive_Green_Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./LuckyDrive_Green_Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (For Manual Run)
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      uses: actions/upload-artifact@v4
      with:
        name: LuckyDrive-Green-Windows
        path: ./LuckyDrive_Green_Windows.zip
