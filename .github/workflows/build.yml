name: Build and Release Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 👇 核心大招 1：强制彻底斩断 GitHub 的旧依赖缓存，100% 重新向微软拉取干净的依赖结构
    - name: Restore Dependencies with No Cache
      run: |
        dotnet restore LuckyDrive/LuckyDrive.csproj --runtime win-x64

    # 👇 核心大招 2：直接采用平铺发布，不和临时缓存发生任何纠缠
    - name: Publish Single File Exe
      run: |
        dotnet publish LuckyDrive/LuckyDrive.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

    # 后续打包步骤保持原样
    - name: Compress Release Artifact
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./LuckyDrive_Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./LuckyDrive_Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (For Manual Run)
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      uses: actions/upload-artifact@v4
      with:
        name: LuckyDrive-Windows-Build
        path: ./LuckyDrive_Windows.zip
