name: Build GUI EXE
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: |
          # 创建项目并手动指定为 WinExe
          dotnet new winforms -n MountTool
          # 用我们上面的代码覆盖 Program.cs
          mv MountTool/Program.cs MountTool/Program.cs.bak
          # 将你仓库里的代码文件复制进去（假设你已经上传了上面的代码）
          # 这里为了简单，我们直接用 dotnet publish
          dotnet publish MountTool -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:OutputType=WinExe -o output
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WebDAVTool
          path: output/*
