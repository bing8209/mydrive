name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: |
          # 这里写入一段极简的 C# 代码并编译
          echo 'using System.Diagnostics; public class Program { public static void Main() { Process.Start("net.exe", "use Z: https://你的地址 /user:账号 密码"); } }' > Program.cs
          dotnet new console
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o output
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: MyWebDAVTool
          path: output/
