name: .NET Core Desktop Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and Publish
      run: |
        # 🚀 彻底开除 PublishSingleFile，走 100% 免疫系统拦截的绿色解压即用文件夹模式
        dotnet publish LuckyDrive/LuckyDrive.csproj -c Release -r win-x64 --self-contained true -o ./publish

    - name: Compress Release Artifact
      run: |
        powershell Compress-Archive -Path ./publish/* -DestinationPath ./LuckyDrive_GreenFolder_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LuckyDrive_GreenFolder_Windows
        path: ./LuckyDrive_GreenFolder_Windows.zip
