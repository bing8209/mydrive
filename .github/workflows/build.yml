name: Build EXE

# 修改这里：将 on: [push] 改为 workflow_dispatch
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: |
          echo 'using System.Diagnostics; public class Program { public static void Main() { Process.Start("net.exe", "use Z: https://你的地址 /user:账号 密码"); } }' > Program.cs
          dotnet new console
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o output
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyWebDAVTool
          path: output/*
