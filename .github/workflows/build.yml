name: .NET Core Desktop Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and Publish
      run: |
        # 🚀 重新启用单文件发布，并且加入自包含，打出来就是一个独立的 LuckyDriveApp.exe
        dotnet publish LuckyDrive/LuckyDrive.csproj -c Release -r win-x64 -p:PublishSingleFile=true --self-contained true -o ./publish

    - name: Compress Release Artifact
      run: |
        # 依旧打包成 zip，解压后里面就只有纯净的一个 exe 文件和皮肤配置
        powershell Compress-Archive -Path ./publish/* -DestinationPath ./LuckyDrive_SingleFile_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LuckyDrive_SingleFile_Windows
        path: ./LuckyDrive_SingleFile_Windows.zip
